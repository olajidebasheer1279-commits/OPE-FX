services:
  - type: web
    name: ope-fx
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install -g pnpm@10 && pnpm install --frozen-lockfile && pnpm run build:render && node lib/db/migrate.mjs
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      # VITE_CLERK_PUBLISHABLE_KEY must be set as a build-time env var in the
      # Render dashboard so Vite can inline it during the frontend build.
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      # Backend market-data credentials. The alert engine runs from this
      # service process and does not depend on the browser or SSE clients.
      - key: FINNHUB_API_KEY
        sync: false
      - key: TWELVEDATA_API_KEY
        sync: false
      # Web Push VAPID credentials. Generate with:
      # pnpm --filter @workspace/api-server exec web-push generate-vapid-keys
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:alerts@ope-fx.app
