openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard operations
  - name: trades
    description: Trade log operations
  - name: journals
    description: Daily journal operations
  - name: rules
    description: Trading rules checklist operations
  - name: reviews
    description: Performance review operations
  - name: analytics
    description: Advanced analytics and OPE Performance Rating
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary
      description: Returns aggregate trading statistics, equity curve, outcome breakdown, goal progress, and recent trades for the authenticated user's primary account.
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /trades:
    get:
      operationId: listTrades
      tags: [trades]
      summary: List trades
      description: Search, filter, sort, and paginate the authenticated user's trades.
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Free-text match against symbol, strategy, and notes.
        - name: direction
          in: query
          schema: { type: string, enum: [long, short] }
        - name: outcome
          in: query
          schema: { type: string, enum: [win, loss, breakeven] }
        - name: status
          in: query
          schema: { type: string, enum: [open, closed] }
        - name: market
          in: query
          schema: { type: string }
        - name: dateFrom
          in: query
          schema: { type: string, format: date-time }
        - name: dateTo
          in: query
          schema: { type: string, format: date-time }
        - name: sortBy
          in: query
          schema: { type: string, enum: [openedAt, pnl, riskRewardRatio, symbol], default: openedAt }
        - name: sortDir
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: Paginated trade list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createTrade
      tags: [trades]
      summary: Create a trade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeInput"
      responses:
        "201":
          description: Trade created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /trades/{id}:
    get:
      operationId: getTrade
      tags: [trades]
      summary: Get a trade
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Trade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTrade
      tags: [trades]
      summary: Update a trade
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeUpdate"
      responses:
        "200":
          description: Trade updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTrade
      tags: [trades]
      summary: Delete a trade
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /journals:
    get:
      operationId: listJournals
      tags: [journals]
      summary: List journal entries
      description: Returns the authenticated user's journal entries, optionally scoped to a month, for the calendar/history view.
      parameters:
        - name: month
          in: query
          schema: { type: string, pattern: "^\\d{4}-\\d{2}$" }
          description: "Restrict results to this calendar month, format YYYY-MM."
      responses:
        "200":
          description: Journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /journals/{date}:
    get:
      operationId: getJournal
      tags: [journals]
      summary: Get the journal entry for a date
      parameters:
        - name: date
          in: path
          required: true
          schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
      responses:
        "200":
          description: Journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
        "404":
          description: No entry for this date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertJournal
      tags: [journals]
      summary: Create, update, or autosave the journal entry for a date
      parameters:
        - name: date
          in: path
          required: true
          schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalInput"
      responses:
        "200":
          description: Journal entry saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteJournal
      tags: [journals]
      summary: Delete the journal entry for a date
      parameters:
        - name: date
          in: path
          required: true
          schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
      responses:
        "204":
          description: Deleted
        "404":
          description: No entry for this date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /rules:
    get:
      operationId: listRules
      tags: [rules]
      summary: List trading rules
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rule"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createRule
      tags: [rules]
      summary: Create a trading rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleInput"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /rules/{id}:
    patch:
      operationId: updateRule
      tags: [rules]
      summary: Update or toggle a trading rule
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleUpdate"
      responses:
        "200":
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteRule
      tags: [rules]
      summary: Delete a trading rule
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List performance reviews
      parameters:
        - name: period
          in: query
          schema: { type: string, enum: [daily, weekly, monthly] }
        - name: dateFrom
          in: query
          schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
          description: Filter reviews whose startDate >= dateFrom (YYYY-MM-DD)
        - name: dateTo
          in: query
          schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
          description: Filter reviews whose startDate <= dateTo (YYYY-MM-DD)
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a performance review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /reviews/{id}:
    get:
      operationId: getReview
      tags: [reviews]
      summary: Get a review
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateReview
      tags: [reviews]
      summary: Update a review
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewUpdate"
      responses:
        "200":
          description: Review updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteReview
      tags: [reviews]
      summary: Delete a review
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get advanced analytics summary
      description: Returns pair performance, direction/timeframe breakdowns, streaks, equity growth, monthly PnL, and risk distribution.
      parameters:
        - name: dateFrom
          in: query
          schema: { type: string, format: date-time }
        - name: dateTo
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /analytics/opr:
    get:
      operationId: getOprScore
      tags: [analytics]
      summary: Get OPE Performance Rating (OPR)
      description: Returns a 0-100 score based on win rate, R:R, rule compliance, journal completion, risk management, and discipline.
      parameters:
        - name: period
          in: query
          schema: { type: string }
          description: "YYYY-MM for a specific month, or 'all-time'. Defaults to current month."
      responses:
        "200":
          description: OPR score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OprScore"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      description: |
        Unconditionally public — no authentication or ACL checks.
        Searches PUBLIC_OBJECT_SEARCH_PATHS for the given file path.
      parameters:
        - name: filePath
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema: { type: string, format: binary }
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema: { type: string }
          description: "Object path within the private object dir (e.g. `uploads/some-uuid`)."
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema: { type: string, format: binary }
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    TradeSummary:
      type: object
      required:
        - id
        - symbol
        - direction
        - status
        - entryPrice
        - exitPrice
        - pnl
        - riskRewardRatio
        - lotSize
        - openedAt
        - closedAt
      properties:
        id:
          type: integer
        symbol:
          type: string
        direction:
          type: string
          enum: [long, short]
        status:
          type: string
          enum: [open, closed]
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        pnl:
          type: ["number", "null"]
        riskRewardRatio:
          type: ["number", "null"]
        lotSize:
          type: number
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: ["string", "null"]
          format: date-time
    EquityPoint:
      type: object
      required: [date, balance]
      properties:
        date:
          type: string
          format: date-time
        balance:
          type: number
    OutcomeBreakdown:
      type: object
      required: [wins, losses, breakeven]
      properties:
        wins:
          type: integer
        losses:
          type: integer
        breakeven:
          type: integer
    GoalProgress:
      type: object
      required: [targetBalance, currentBalance, progressPercent]
      properties:
        targetBalance:
          type: number
        currentBalance:
          type: number
        progressPercent:
          type: number
    DashboardSummary:
      type: object
      required:
        - currentBalance
        - todayPnl
        - weeklyPnl
        - monthlyPnl
        - winRate
        - avgRiskReward
        - totalTrades
        - winningTrades
        - losingTrades
        - recentTrades
        - equityCurve
        - outcomeBreakdown
        - goalProgress
      properties:
        currentBalance:
          type: number
        todayPnl:
          type: number
        weeklyPnl:
          type: number
        monthlyPnl:
          type: number
        winRate:
          type: number
        avgRiskReward:
          type: number
        totalTrades:
          type: integer
        winningTrades:
          type: integer
        losingTrades:
          type: integer
        recentTrades:
          type: array
          items:
            $ref: "#/components/schemas/TradeSummary"
        equityCurve:
          type: array
          items:
            $ref: "#/components/schemas/EquityPoint"
        outcomeBreakdown:
          $ref: "#/components/schemas/OutcomeBreakdown"
        goalProgress:
          $ref: "#/components/schemas/GoalProgress"
    Trade:
      type: object
      required:
        - id
        - symbol
        - market
        - direction
        - status
        - entryPrice
        - exitPrice
        - stopLoss
        - takeProfit
        - lotSize
        - riskPercent
        - riskAmount
        - pnl
        - pips
        - riskRewardRatio
        - outcome
        - timeframe
        - strategy
        - notes
        - beforeScreenshotUrl
        - afterScreenshotUrl
        - openedAt
        - closedAt
        - createdAt
        - updatedAt
      properties:
        id: { type: integer }
        symbol: { type: string }
        market: { type: string }
        direction: { type: string, enum: [long, short] }
        status: { type: string, enum: [open, closed] }
        entryPrice: { type: number }
        exitPrice: { type: ["number", "null"] }
        stopLoss: { type: ["number", "null"] }
        takeProfit: { type: ["number", "null"] }
        lotSize: { type: number }
        riskPercent: { type: ["number", "null"] }
        riskAmount: { type: ["number", "null"] }
        pnl: { type: ["number", "null"] }
        pips: { type: ["number", "null"] }
        riskRewardRatio: { type: ["number", "null"] }
        outcome: { type: ["string", "null"], enum: [win, loss, breakeven, null] }
        timeframe: { type: ["string", "null"] }
        strategy: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        beforeScreenshotUrl: { type: ["string", "null"] }
        afterScreenshotUrl: { type: ["string", "null"] }
        openedAt: { type: string, format: date-time }
        closedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    TradeInput:
      type: object
      required: [symbol, market, direction, entryPrice, lotSize, openedAt]
      properties:
        symbol: { type: string, minLength: 1 }
        market: { type: string, minLength: 1 }
        direction: { type: string, enum: [long, short] }
        entryPrice: { type: number }
        exitPrice: { type: number }
        stopLoss: { type: number }
        takeProfit: { type: number }
        lotSize: { type: number }
        riskPercent: { type: number }
        riskAmount: { type: number }
        timeframe: { type: string }
        strategy: { type: string }
        notes: { type: string }
        beforeScreenshotUrl: { type: string }
        afterScreenshotUrl: { type: string }
        openedAt: { type: string, format: date-time }
        closedAt: { type: string, format: date-time }
    TradeUpdate:
      type: object
      properties:
        symbol: { type: string, minLength: 1 }
        market: { type: string, minLength: 1 }
        direction: { type: string, enum: [long, short] }
        entryPrice: { type: number }
        exitPrice: { type: ["number", "null"] }
        stopLoss: { type: ["number", "null"] }
        takeProfit: { type: ["number", "null"] }
        lotSize: { type: number }
        riskPercent: { type: ["number", "null"] }
        riskAmount: { type: ["number", "null"] }
        timeframe: { type: ["string", "null"] }
        strategy: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        beforeScreenshotUrl: { type: ["string", "null"] }
        afterScreenshotUrl: { type: ["string", "null"] }
        openedAt: { type: string, format: date-time }
        closedAt: { type: ["string", "null"], format: date-time }
    TradeListResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Trade"
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }
    JournalEntry:
      type: object
      required:
        - id
        - date
        - mood
        - confidence
        - discipline
        - fear
        - greed
        - focus
        - sleep
        - tradingPlan
        - notes
        - mistakes
        - lessons
        - tomorrowGoal
        - isDraft
        - createdAt
        - updatedAt
      properties:
        id: { type: integer }
        date: { type: string }
        mood: { type: ["integer", "null"] }
        confidence: { type: ["integer", "null"] }
        discipline: { type: ["integer", "null"] }
        fear: { type: ["integer", "null"] }
        greed: { type: ["integer", "null"] }
        focus: { type: ["integer", "null"] }
        sleep: { type: ["integer", "null"] }
        tradingPlan: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        mistakes: { type: ["string", "null"] }
        lessons: { type: ["string", "null"] }
        tomorrowGoal: { type: ["string", "null"] }
        isDraft: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    JournalInput:
      type: object
      properties:
